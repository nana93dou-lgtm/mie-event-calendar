<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三重県イベントカレンダー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #F0F7F4; }
    input, select, textarea, button { font-family: 'Noto Sans JP', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #065F46; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const INITIAL_EVENTS = [
      { id: 1, title: "伊勢神宮 春の特別参拝", date: "2026-04-03", category: "文化・観光", location: "伊勢市・内宮", description: "春季恒例の特別参拝。早朝の神楽も楽しめます。", organizer: "伊勢神宮", source: "manual" },
      { id: 2, title: "熊野古道ウォークラリー", date: "2026-04-18", category: "スポーツ・自然", location: "尾鷲市・熊野古道", description: "世界遺産の古道を歩く体験型イベント。", organizer: "尾鷲市観光協会", source: "manual" },
      { id: 3, title: "三重県産業フェア2026", date: "2026-05-09", category: "産業・ビジネス", location: "津市・三重県総合文化センター", description: "県内企業の技術・製品が一堂に集まる展示会。", organizer: "三重県商工会議所連合会", source: "manual" },
      { id: 4, title: "松阪牛まつり", date: "2026-05-17", category: "農業・食", location: "松阪市・松阪農業公園ベルファーム", description: "松阪牛の試食・販売、農業体験など盛りだくさん。", organizer: "松阪市", source: "manual" },
      { id: 5, title: "子ども科学教室 in 四日市", date: "2026-04-25", category: "教育・学習", location: "四日市市・市立博物館", description: "小中学生対象の実験・工作ワークショップ。", organizer: "四日市市教育委員会", source: "manual" },
      { id: 6, title: "志摩マリンフェスタ", date: "2026-05-03", category: "スポーツ・自然", location: "志摩市・英虞湾", description: "カヤック・シュノーケリング体験など海のアクティビティ。", organizer: "志摩市観光協会", source: "manual" },
    ];

    const CATEGORIES = ["文化・観光", "産業・ビジネス", "教育・学習", "スポーツ・自然", "農業・食", "福祉・医療", "その他"];
    const CAT_COLOR = {
      "文化・観光": "#EC4899", "産業・ビジネス": "#3B82F6", "教育・学習": "#10B981",
      "スポーツ・自然": "#F59E0B", "農業・食": "#84CC16", "福祉・医療": "#8B5CF6", "その他": "#6B7280",
    };

    function App() {
      const [page, setPage] = useState(() => {
        const p = new URLSearchParams(window.location.search).get("page");
        return p === "admin" ? "admin" : "public";
      });
      const [events, setEvents] = useState(INITIAL_EVENTS);
      if (page === "admin") return <AdminPage events={events} setEvents={setEvents} onBack={() => setPage("public")} />;
      return <PublicPage events={events} />;
    }

    function PublicPage({ events }) {
      const [view, setView] = useState("list");
      const [filterCat, setFilterCat] = useState("すべて");
      const [search, setSearch] = useState("");
      const [selected, setSelected] = useState(null);
      const [currentMonth, setCurrentMonth] = useState(new Date(2026, 3));
      const [chat, setChat] = useState({ open: false, messages: [], input: "", loading: false });

      const filtered = events.filter(e =>
        (filterCat === "すべて" || e.category === filterCat) &&
        (search === "" || e.title.includes(search) || e.location.includes(search) || e.description.includes(search))
      );

      const yr = currentMonth.getFullYear(), mo = currentMonth.getMonth();
      const days = new Date(yr, mo + 1, 0).getDate();
      const startDay = new Date(yr, mo, 1).getDay();
      const calEvents = events.filter(e => { const d = new Date(e.date); return d.getFullYear() === yr && d.getMonth() === mo; });

      async function sendChat() {
        const msg = chat.input.trim(); if (!msg) return;
        const newMsgs = [...chat.messages, { role: "user", content: msg }];
        setChat(c => ({ ...c, messages: newMsgs, input: "", loading: true }));
        try {
          const eventList = events.map(e => `・${e.title}（${e.date}、${e.location}）`).join("\n");
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 500,
              system: `あなたは三重県イベントカレンダーのAIアシスタントです。登録済みのイベント情報をもとに質問に答えてください。簡潔に日本語で答えてください。\n\n登録イベント一覧:\n${eventList}`,
              messages: newMsgs
            })
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text?.trim() || "申し訳ありません、応答できませんでした。";
          setChat(c => ({ ...c, loading: false, messages: [...newMsgs, { role: "assistant", content: reply }] }));
        } catch {
          setChat(c => ({ ...c, loading: false, messages: [...newMsgs, { role: "assistant", content: "エラーが発生しました。" }] }));
        }
      }

      return (
        <div style={{ minHeight: "100vh", background: "#F0F7F4" }}>
          <header style={{ background: "linear-gradient(135deg,#064E3B,#065F46,#047857)", color: "white", padding: "0 28px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 68, boxShadow: "0 2px 16px rgba(0,0,0,0.2)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <span style={{ fontSize: 32 }}>🦞</span>
              <div>
                <div style={{ fontFamily: "'Shippori Mincho',serif", fontWeight: 800, fontSize: 18, letterSpacing: "0.08em" }}>三重県イベントカレンダー</div>
                <div style={{ fontSize: 10, color: "#6EE7B7", letterSpacing: "0.1em" }}>MIE PREFECTURE EVENT PORTAL</div>
              </div>
            </div>
            <span style={{ background: "rgba(255,255,255,0.15)", padding: "4px 12px", borderRadius: 20, fontSize: 12, color: "#A7F3D0" }}>{events.length} 件のイベント</span>
          </header>

          <div style={{ background: "linear-gradient(160deg,#064E3B,#065F46,#0F766E)", color: "white", padding: "44px 28px 40px", textAlign: "center", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -40, right: -40, width: 200, height: 200, background: "rgba(255,255,255,0.03)", borderRadius: "50%" }} />
            <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 30, fontWeight: 800, marginBottom: 8 }}>三重のイベントを探す</div>
            <div style={{ color: "#6EE7B7", fontSize: 13, marginBottom: 28 }}>県内全域のイベント情報をまとめてお届け</div>
            <input placeholder="🔍  イベント名・会場・キーワードで検索..." value={search} onChange={e => setSearch(e.target.value)}
              style={{ width: "100%", maxWidth: 560, padding: "14px 20px", borderRadius: 12, border: "none", fontSize: 14, outline: "none", background: "rgba(255,255,255,0.15)", color: "white", backdropFilter: "blur(8px)" }} />
          </div>

          <div style={{ background: "white", padding: "12px 24px", display: "flex", gap: 8, alignItems: "center", borderBottom: "1px solid #D1FAE5", flexWrap: "wrap", justifyContent: "space-between" }}>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {["すべて", ...CATEGORIES].map(cat => (
                <button key={cat} onClick={() => setFilterCat(cat)} style={{ padding: "5px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: filterCat === cat ? "#064E3B" : "#ECFDF5", color: filterCat === cat ? "white" : "#065F46" }}>{cat}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {[["list","リスト"],["calendar","カレンダー"]].map(([v,l]) => (
                <button key={v} onClick={() => setView(v)} style={{ padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, background: view === v ? "#064E3B" : "#ECFDF5", color: view === v ? "white" : "#065F46" }}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 24px 100px" }}>
            {view === "list" ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 16 }}>
                {filtered.map(ev => (
                  <div key={ev.id} onClick={() => setSelected(ev)} style={{ background: "white", borderRadius: 14, padding: 20, cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", border: "1px solid #D1FAE5", borderLeft: `4px solid ${CAT_COLOR[ev.category]||"#6B7280"}`, transition: "all 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 8px 24px rgba(6,78,59,0.12)"; }}
                    onMouseLeave={e => { e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)"; }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ background: (CAT_COLOR[ev.category]||"#6B7280")+"18", color: CAT_COLOR[ev.category]||"#6B7280", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20 }}>{ev.category}</span>
                      <span style={{ fontSize: 12, color: "#6B7280" }}>{ev.date}</span>
                    </div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#064E3B", marginBottom: 6, lineHeight: 1.4 }}>{ev.title}</div>
                    <div style={{ fontSize: 12, color: "#059669", marginBottom: 4 }}>📍 {ev.location}</div>
                    <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.5 }}>{ev.description}</div>
                    {ev.source === "ai" && <div style={{ marginTop: 8, fontSize: 10, color: "#7C3AED", background: "#EDE9FE", padding: "2px 8px", borderRadius: 10, display: "inline-block" }}>🤖 AI収集</div>}
                  </div>
                ))}
                {filtered.length === 0 && (
                  <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 60, color: "#9CA3AF" }}>
                    <div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div>
                    <div>該当するイベントが見つかりませんでした</div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ background: "white", borderRadius: 16, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                  <button onClick={() => setCurrentMonth(m => new Date(m.getFullYear(), m.getMonth()-1))} style={{ border: "1px solid #D1FAE5", background: "white", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 16, color: "#064E3B" }}>‹</button>
                  <div style={{ fontWeight: 700, fontSize: 18, color: "#064E3B", fontFamily: "'Shippori Mincho',serif" }}>{yr}年 {mo+1}月</div>
                  <button onClick={() => setCurrentMonth(m => new Date(m.getFullYear(), m.getMonth()+1))} style={{ border: "1px solid #D1FAE5", background: "white", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 16, color: "#064E3B" }}>›</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
                  {["日","月","火","水","木","金","土"].map(d => <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: "#9CA3AF", padding: "6px 0" }}>{d}</div>)}
                  {Array.from({length: startDay}).map((_,i) => <div key={`e${i}`} />)}
                  {Array.from({length: days}).map((_,i) => {
                    const day = i+1;
                    const de = calEvents.filter(e => new Date(e.date).getDate() === day);
                    return (
                      <div key={day} style={{ minHeight: 70, background: "#F0FDF4", borderRadius: 8, padding: 6, border: "1px solid #D1FAE5" }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 3 }}>{day}</div>
                        {de.map(ev => (
                          <div key={ev.id} onClick={() => setSelected(ev)} style={{ background: CAT_COLOR[ev.category]||"#6B7280", color: "white", fontSize: 10, padding: "2px 5px", borderRadius: 4, marginBottom: 2, cursor: "pointer", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.title}</div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {selected && (
            <div onClick={() => setSelected(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "white", borderRadius: 16, padding: 32, maxWidth: 480, width: "100%", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>
                <span style={{ background: (CAT_COLOR[selected.category]||"#6B7280")+"18", color: CAT_COLOR[selected.category]||"#6B7280", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20 }}>{selected.category}</span>
                <h2 style={{ fontWeight: 700, fontSize: 20, margin: "12px 0 8px", color: "#064E3B", fontFamily: "'Shippori Mincho',serif" }}>{selected.title}</h2>
                <div style={{ fontSize: 14, color: "#059669", marginBottom: 6 }}>📅 {selected.date}</div>
                <div style={{ fontSize: 14, color: "#059669", marginBottom: 6 }}>📍 {selected.location}</div>
                {selected.organizer && <div style={{ fontSize: 14, color: "#059669", marginBottom: 6 }}>🏢 主催：{selected.organizer}</div>}
                <div style={{ fontSize: 14, color: "#374151", marginTop: 12, lineHeight: 1.8 }}>{selected.description}</div>
                {selected.source === "ai" && <div style={{ marginTop: 10, fontSize: 11, color: "#7C3AED", background: "#EDE9FE", padding: "4px 12px", borderRadius: 10, display: "inline-block" }}>🤖 AIが自動収集したイベントです</div>}
                <button onClick={() => setSelected(null)} style={{ marginTop: 20, width: "100%", background: "#064E3B", color: "white", border: "none", borderRadius: 10, padding: 12, fontWeight: 700, cursor: "pointer" }}>閉じる</button>
              </div>
            </div>
          )}

          <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 200 }}>
            {chat.open && (
              <div style={{ position: "absolute", bottom: 70, right: 0, width: 340, background: "white", borderRadius: 16, boxShadow: "0 8px 40px rgba(0,0,0,0.15)", overflow: "hidden", border: "1px solid #D1FAE5" }}>
                <div style={{ background: "linear-gradient(135deg,#064E3B,#0F766E)", color: "white", padding: "14px 18px", fontWeight: 700, fontSize: 14 }}>
                  🤖 AIアシスタント
                  <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.7, marginTop: 2 }}>イベントについて何でも聞いてください</div>
                </div>
                <div style={{ height: 240, overflowY: "auto", padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
                  {chat.messages.length === 0 && <div style={{ color: "#9CA3AF", fontSize: 13, textAlign: "center", marginTop: 60 }}>「今週のイベントは？」など<br/>気軽に聞いてみてください</div>}
                  {chat.messages.map((m,i) => (
                    <div key={i} style={{ alignSelf: m.role==="user"?"flex-end":"flex-start", background: m.role==="user"?"#064E3B":"#F0FDF4", color: m.role==="user"?"white":"#064E3B", padding: "8px 12px", borderRadius: 12, maxWidth: "85%", fontSize: 13, lineHeight: 1.6 }}>{m.content}</div>
                  ))}
                  {chat.loading && <div style={{ color: "#9CA3AF", fontSize: 12 }}>考え中...</div>}
                </div>
                <div style={{ padding: 12, borderTop: "1px solid #D1FAE5", display: "flex", gap: 8 }}>
                  <input value={chat.input} onChange={e => setChat(c => ({...c,input:e.target.value}))} onKeyDown={e => e.key==="Enter" && sendChat()} placeholder="質問を入力..."
                    style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #D1FAE5", fontSize: 13, outline: "none" }} />
                  <button onClick={sendChat} style={{ background: "#064E3B", color: "white", border: "none", borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 13 }}>送信</button>
                </div>
              </div>
            )}
            <button onClick={() => setChat(c => ({...c,open:!c.open}))} style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg,#059669,#0F766E)", border: "none", cursor: "pointer", fontSize: 24, boxShadow: "0 4px 20px rgba(5,150,105,0.4)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {chat.open ? "✕" : "🤖"}
            </button>
          </div>
        </div>
      );
    }

    function AdminPage({ events, setEvents, onBack }) {
      const [tab, setTab] = useState("list");
      const [form, setForm] = useState({ title:"", date:"", location:"", description:"", organizer:"", category:"" });
      const [ai, setAi] = useState({ url:"", loading:false, result:null, error:null, suggestion:null, classifying:false });
      const [editId, setEditId] = useState(null);

      async function fetchFromUrl() {
        if (!ai.url.trim()) return;
        setAi(a => ({...a, loading:true, result:null, error:null}));
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 1000,
              tools: [{ type: "web_search_20250305", name: "web_search" }],
              system: "あなたはイベント情報抽出AIです。与えられたURLやキーワードからイベント情報を検索・抽出し、必ずJSON形式のみで返してください。マークダウンやコードブロックは使わないでください。",
              messages: [{ role: "user", content: `以下のURLまたはキーワードからイベント情報を取得・抽出してください: ${ai.url}\n\n以下のJSON形式のみで返答してください（他の文字は一切含めないこと）:\n{"title":"","date":"YYYY-MM-DD","location":"","description":"","organizer":"","category":"文化・観光|産業・ビジネス|教育・学習|スポーツ・自然|農業・食|福祉・医療|その他"}` }]
            })
          });
          const data = await res.json();
          const text = data.content?.filter(b => b.type==="text").map(b => b.text).join("") || "";
          const clean = text.replace(/```json|```/g,"").trim();
          const parsed = JSON.parse(clean);
          setAi(a => ({...a, loading:false, result:parsed}));
          setForm(parsed);
        } catch {
          setAi(a => ({...a, loading:false, error:"情報の抽出に失敗しました。URLを確認するか、手動で入力してください。"}));
        }
      }

      async function autoClassify() {
        if (!form.title && !form.description) return;
        setAi(a => ({...a, classifying:true}));
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 100,
              messages: [{ role: "user", content: `イベント名「${form.title}」説明「${form.description}」に最適なカテゴリを1つ選んでください。\n選択肢: ${CATEGORIES.join("、")}\nカテゴリ名のみ返答してください。` }]
            })
          });
          const data = await res.json();
          const cat = data.content?.[0]?.text?.trim();
          if (CATEGORIES.includes(cat)) {
            setForm(f => ({...f, category:cat}));
            setAi(a => ({...a, classifying:false, suggestion:`カテゴリを「${cat}」に自動分類しました ✓`}));
          } else { setAi(a => ({...a, classifying:false})); }
        } catch { setAi(a => ({...a, classifying:false})); }
      }

      async function aiCheck() {
        setAi(a => ({...a, classifying:true, suggestion:null}));
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 300,
              messages: [{ role: "user", content: `イベント登録内容をチェックし改善点を2〜3点教えてください。問題なければ「登録内容は問題ありません ✓」と答えてください。\nタイトル:${form.title} 日付:${form.date} 場所:${form.location} 説明:${form.description} 主催:${form.organizer} カテゴリ:${form.category}` }]
            })
          });
          const data = await res.json();
          setAi(a => ({...a, classifying:false, suggestion:data.content?.[0]?.text?.trim()}));
        } catch { setAi(a => ({...a, classifying:false, suggestion:"チェックに失敗しました。"})); }
      }

      function saveEvent() {
        if (!form.title || !form.date || !form.location) return alert("タイトル・日付・場所は必須です");
        if (editId) {
          setEvents(ev => ev.map(e => e.id===editId ? {...e,...form} : e));
          setEditId(null);
        } else {
          setEvents(ev => [...ev, {id:Date.now(),...form,source:tab==="ai"?"ai":"manual"}]);
        }
        setForm({title:"",date:"",location:"",description:"",organizer:"",category:""});
        setAi(a => ({...a,url:"",result:null,suggestion:null}));
        setTab("list");
      }

      function deleteEvent(id) { if (window.confirm("削除しますか？")) setEvents(ev => ev.filter(e => e.id!==id)); }
      function startEdit(ev) { setForm({title:ev.title,date:ev.date,location:ev.location,description:ev.description,organizer:ev.organizer,category:ev.category}); setEditId(ev.id); setTab("manual"); }

      const iStyle = { width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid #D1FAE5", fontSize:14, outline:"none" };
      const lStyle = { fontSize:12, fontWeight:600, color:"#065F46", display:"block", marginBottom:4 };

      return (
        <div style={{ minHeight:"100vh", background:"#F0FDF4" }}>
          <header style={{ background:"linear-gradient(135deg,#064E3B,#065F46)", color:"white", padding:"0 28px", display:"flex", alignItems:"center", justifyContent:"space-between", height:64 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:24 }}>🦞</span>
              <div>
                <div style={{ fontFamily:"'Shippori Mincho',serif", fontWeight:800, fontSize:16 }}>三重県イベントカレンダー</div>
                <div style={{ fontSize:10, color:"#6EE7B7", letterSpacing:"0.1em" }}>管理者ページ</div>
              </div>
            </div>
            <button onClick={onBack} style={{ background:"rgba(255,255,255,0.15)", color:"white", border:"1px solid rgba(255,255,255,0.3)", borderRadius:8, padding:"7px 16px", cursor:"pointer", fontSize:13 }}>← 公開ページへ</button>
          </header>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"28px 24px" }}>
            <div style={{ display:"flex", gap:4, marginBottom:24, background:"white", padding:4, borderRadius:12, border:"1px solid #D1FAE5", width:"fit-content" }}>
              {[["list","📋 イベント一覧"],["manual","✏️ 手動登録"],["ai","🤖 AI自動収集"]].map(([key,label]) => (
                <button key={key} onClick={() => { setTab(key); if (key!=="manual") { setEditId(null); setForm({title:"",date:"",location:"",description:"",organizer:"",category:""}); } }} style={{ padding:"8px 20px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:600, background:tab===key?"#064E3B":"transparent", color:tab===key?"white":"#065F46" }}>{label}</button>
              ))}
            </div>

            {tab === "list" && (
              <div>
                <div style={{ marginBottom:16, fontSize:14, color:"#065F46", fontWeight:600 }}>登録済みイベント（{events.length}件）</div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {events.map(ev => (
                    <div key={ev.id} style={{ background:"white", borderRadius:12, padding:"16px 20px", display:"flex", alignItems:"center", gap:16, border:"1px solid #D1FAE5", borderLeft:`4px solid ${CAT_COLOR[ev.category]||"#6B7280"}` }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, color:"#064E3B", marginBottom:4 }}>{ev.title}</div>
                        <div style={{ fontSize:12, color:"#059669" }}>{ev.date}　📍 {ev.location}</div>
                      </div>
                      <span style={{ background:(CAT_COLOR[ev.category]||"#6B7280")+"18", color:CAT_COLOR[ev.category]||"#6B7280", fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20 }}>{ev.category}</span>
                      {ev.source==="ai" && <span style={{ fontSize:10, color:"#7C3AED", background:"#EDE9FE", padding:"2px 8px", borderRadius:10 }}>🤖 AI</span>}
                      <button onClick={() => startEdit(ev)} style={{ background:"#ECFDF5", color:"#065F46", border:"1px solid #D1FAE5", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:600 }}>編集</button>
                      <button onClick={() => deleteEvent(ev.id)} style={{ background:"#FEF2F2", color:"#DC2626", border:"1px solid #FECACA", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:600 }}>削除</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === "manual" && (
              <div style={{ background:"white", borderRadius:16, padding:28, border:"1px solid #D1FAE5" }}>
                <h2 style={{ fontWeight:700, fontSize:18, color:"#064E3B", marginBottom:20 }}>{editId?"イベント編集":"イベント手動登録"}</h2>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={lStyle}>イベント名 *</label>
                    <input value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} onBlur={autoClassify} placeholder="例：第5回 伊勢志摩サミット記念イベント" style={iStyle} />
                  </div>
                  <div>
                    <label style={lStyle}>開催日 *</label>
                    <input type="date" value={form.date} onChange={e => setForm(f=>({...f,date:e.target.value}))} style={iStyle} />
                  </div>
                  <div>
                    <label style={lStyle}>カテゴリ</label>
                    <select value={form.category} onChange={e => setForm(f=>({...f,category:e.target.value}))} style={{...iStyle,background:"white"}}>
                      <option value="">選択してください</option>
                      {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={lStyle}>会場 *</label>
                    <input value={form.location} onChange={e => setForm(f=>({...f,location:e.target.value}))} placeholder="例：津市・三重県総合文化センター" style={iStyle} />
                  </div>
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={lStyle}>主催者</label>
                    <input value={form.organizer} onChange={e => setForm(f=>({...f,organizer:e.target.value}))} placeholder="例：三重県観光連盟" style={iStyle} />
                  </div>
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={lStyle}>説明</label>
                    <textarea value={form.description} onChange={e => setForm(f=>({...f,description:e.target.value}))} onBlur={autoClassify} placeholder="イベントの概要・内容を入力してください" style={{...iStyle,minHeight:90,resize:"vertical"}} />
                  </div>
                </div>
                {(ai.classifying || ai.suggestion) && (
                  <div style={{ background:ai.classifying?"#EFF6FF":"#F0FDF4", border:`1px solid ${ai.classifying?"#BFDBFE":"#BBF7D0"}`, borderRadius:10, padding:"10px 14px", fontSize:13, color:ai.classifying?"#2563EB":"#166534", marginBottom:14, whiteSpace:"pre-wrap" }}>
                    {ai.classifying ? "🤖 AI分析中..." : `🤖 ${ai.suggestion}`}
                  </div>
                )}
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={aiCheck} disabled={ai.classifying} style={{ flex:1, background:"#ECFDF5", color:"#065F46", border:"1px solid #D1FAE5", borderRadius:10, padding:11, fontWeight:700, cursor:"pointer", fontSize:13 }}>🤖 AIチェック</button>
                  <button onClick={saveEvent} style={{ flex:2, background:"linear-gradient(135deg,#064E3B,#0F766E)", color:"white", border:"none", borderRadius:10, padding:11, fontWeight:700, cursor:"pointer", fontSize:13 }}>{editId?"更新する":"登録する"}</button>
                </div>
              </div>
            )}

            {tab === "ai" && (
              <div style={{ background:"white", borderRadius:16, padding:28, border:"1px solid #D1FAE5" }}>
                <h2 style={{ fontWeight:700, fontSize:18, color:"#064E3B", marginBottom:6 }}>🤖 AI自動収集</h2>
                <p style={{ fontSize:13, color:"#6B7280", marginBottom:12 }}>公式サイトのURLを入力するか、下のボタンから対象サイトを選ぶと、AIがイベント情報を自動で抽出・入力します。</p>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
                  {[
                    { label:"🏛 三重県HP", url:"https://www.pref.mie.lg.jp" },
                    { label:"🌿 観光三重", url:"https://www.kankomie.or.jp" },
                    { label:"🗺 ウォーカープラス", url:"https://event.walkerplus.com/area/mie/" },
                    { label:"🍵 三重テラス", url:"https://www.mie-terrace.jp" },
                  ].map(s => (
                    <button key={s.label} onClick={() => setAi(a=>({...a,url:s.url}))} style={{ background:"#ECFDF5", color:"#065F46", border:"1px solid #D1FAE5", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:600 }}>{s.label}</button>
                  ))}
                </div>
                <div style={{ display:"flex", gap:10, marginBottom:20 }}>
                  <input value={ai.url} onChange={e => setAi(a=>({...a,url:e.target.value}))} onKeyDown={e => e.key==="Enter" && fetchFromUrl()} placeholder="URLを入力、またはキーワード（例：三重県 夏まつり 2026）" style={{...iStyle,flex:1}} />
                  <button onClick={fetchFromUrl} disabled={ai.loading} style={{ background:"linear-gradient(135deg,#064E3B,#0F766E)", color:"white", border:"none", borderRadius:10, padding:"10px 20px", fontWeight:700, cursor:"pointer", fontSize:13, whiteSpace:"nowrap" }}>
                    {ai.loading ? "取得中..." : "🔍 取得"}
                  </button>
                </div>
                {ai.loading && <div style={{ background:"#EFF6FF", borderRadius:12, padding:20, textAlign:"center", color:"#2563EB", fontSize:13, marginBottom:20 }}>🤖 AIがWebを検索・解析しています...</div>}
                {ai.error && <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:10, padding:"12px 16px", fontSize:13, color:"#DC2626", marginBottom:20 }}>{ai.error}</div>}
                {ai.result && !ai.loading && <div style={{ background:"#F0FDF4", border:"1px solid #BBF7D0", borderRadius:12, padding:16, marginBottom:20 }}><div style={{ fontSize:13, fontWeight:700, color:"#065F46" }}>✅ 以下の情報を抽出しました。編集して登録できます。</div></div>}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                  <div style={{ gridColumn:"1/-1" }}><label style={lStyle}>イベント名 *</label><input value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} style={iStyle} /></div>
                  <div><label style={lStyle}>開催日</label><input type="date" value={form.date} onChange={e => setForm(f=>({...f,date:e.target.value}))} style={iStyle} /></div>
                  <div><label style={lStyle}>カテゴリ</label>
                    <select value={form.category} onChange={e => setForm(f=>({...f,category:e.target.value}))} style={{...iStyle,background:"white"}}>
                      <option value="">選択</option>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div style={{ gridColumn:"1/-1" }}><label style={lStyle}>会場</label><input value={form.location} onChange={e => setForm(f=>({...f,location:e.target.value}))} style={iStyle} /></div>
                  <div style={{ gridColumn:"1/-1" }}><label style={lStyle}>主催者</label><input value={form.organizer} onChange={e => setForm(f=>({...f,organizer:e.target.value}))} style={iStyle} /></div>
                  <div style={{ gridColumn:"1/-1" }}><label style={lStyle}>説明</label><textarea value={form.description} onChange={e => setForm(f=>({...f,description:e.target.value}))} style={{...iStyle,minHeight:80,resize:"vertical"}} /></div>
                </div>
                <button onClick={saveEvent} style={{ width:"100%", background:"linear-gradient(135deg,#064E3B,#0F766E)", color:"white", border:"none", borderRadius:10, padding:12, fontWeight:700, cursor:"pointer", fontSize:14 }}>
                  🤖 このイベントをAI収集として登録する
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
